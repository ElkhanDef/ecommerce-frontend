<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .auth-root {
      min-height: 100vh;
      display: flex;
      font-family: 'DM Sans', sans-serif;
      background: #f8f9fa;
      padding: 1rem;
    }

    .auth-left {
      flex: 1;
      background: linear-gradient(145deg, #BA7517 0%, #EF9F27 50%, #FAC775 100%);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
      min-height: 500px;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .auth-left::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .left-content {
      position: relative; z-index: 1;
    }

    .left-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .left-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      max-width: 300px;
    }

    .left-stats {
      display: flex;
      gap: 2rem;
      position: relative; z-index: 1;
    }

    .stat-item { }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.5px;
    }

    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    .tabs {
      display: flex;
      background: #f0f0f0;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
      border: 0.5px solid #e0e0e0;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
      background: transparent;
      border: none;
    }

    .tab.active {
      background: #EF9F27;
      color: #412402;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }

    .form-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.75rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 0.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: #EF9F27;
      box-shadow: 0 0 0 3px rgba(239,159,39,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #EF9F27;
      color: #412402;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #BA7517; color: #fff; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
      color: #999;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: #ddd;
    }

    .btn-google {
      width: 100%;
      padding: 11px;
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .btn-google:hover { background: #f8f9fa; }

    .g-icon {
      width: 18px; height: 18px;
      font-size: 16px;
    }

    .forgot {
      text-align: right;
      margin-bottom: 1rem;
    }

    .forgot a {
      font-size: 13px;
      color: #BA7517;
      text-decoration: none;
    }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="auth-root">
  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">🛍</div>
      <span class="brand-name">E-Commerce</span>
    </div>
    <div class="left-content">
      <div class="left-title">Kaliteli<br>Hediyelikler<br>Kapınızda</div>
      <div class="left-desc">El yapımı porselen ve cam ürünler, özel tasarım hediyelikler. Türkiye'nin en güzel el sanatları burada.</div>
    </div>
    <div class="left-stats">
      <div class="stat-item">
        <div class="stat-num">500+</div>
        <div class="stat-label">ÜRÜN</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">12K+</div>
        <div class="stat-label">MÜŞTERİ</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">4.9</div>
        <div class="stat-label">PUAN</div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" onclick="showPanel('login', this)">Giriş Yap</button>
        <button class="tab" onclick="showPanel('register', this)">Kayıt Ol</button>
      </div>

      <div id="login" class="panel active">
        <div class="form-title">Hoş Geldiniz</div>
        <div class="form-subtitle">Hesabınıza giriş yapın</div>

        <div class="form-group">
          <label class="form-label">E-posta</label>
          <input class="form-input" type="email" placeholder="ornek@mail.com">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input class="form-input" type="password" placeholder="••••••••">
        </div>
        <div class="forgot"><a href="#">Şifremi unuttum</a></div>
        <button class="btn-primary">Giriş Yap</button>
        <div class="divider">veya</div>
        <button class="btn-google">
          <span class="g-icon">G</span>
          Google ile devam et
        </button>
      </div>

      <div id="register" class="panel">
        <div class="form-title">Hesap Oluştur</div>
        <div class="form-subtitle">Hızlıca üye olun</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Ad</label>
            <input class="form-input" type="text" placeholder="Adınız">
          </div>
          <div class="form-group">
            <label class="form-label">Soyad</label>
            <input class="form-input" type="text" placeholder="Soyadınız">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">E-posta</label>
          <input class="form-input" type="email" placeholder="ornek@mail.com">
        </div>
        <div class="form-group">
          <label class="form-label">Telefon (opsiyonel)</label>
          <input class="form-input" type="tel" placeholder="05XX XXX XX XX">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input class="form-input" type="password" placeholder="En az 8 karakter">
        </div>
        <button class="btn-primary">Kayıt Ol</button>
        <div class="divider">veya</div>
        <button class="btn-google">
          <span class="g-icon">G</span>
          Google ile devam et
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  function showPanel(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    btn.classList.add('active');
  }
</script>

</body>
</html>
